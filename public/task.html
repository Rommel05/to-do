<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task</title>
    <script src="js/scriptTask.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/calendar-es.js"></script>
    <script src="js/calendar-setup.js"></script>
    <link rel="stylesheet" href="css/style-task.css">
    <link rel="stylesheet" href="css/calendar-blue.css">
</head>
<body>
    <div id="main-layout">
        <header id="header1">
            <h1>Tarea</h1>
        </header>
        <form method="get" id="form">
            <input type="text" name="tarea" id="tarea">
            <div id="contenedor-fecha">
                <input type="text" name="date" id="fecha" readonly="readonly">
                <img src="img/calendario.png" id="selector" alt="icono calendario">
            </div>
            <input type="button" name="add" id="add" value="Añadir tarea">
        </form>
    </div>
</body>
</html>
